################################################################################
# Node-RED Stack or Compose
################################################################################
# docker stack deploy node-red --compose-file docker-compose-node-red.yml
# docker-compose -f docker-compose-node-red.yml -p myNoderedProject up
################################################################################

services:
  node-red:
    image: custom-node-red
    restart: always
    container_name: node-red-main
    environment:
      - TZ=Europe/Amsterdam
    ports:
      - "80:1880"
    depends_on:
      - mosquitto
    volumes:
      - ./node-red-data:/data
      
  mosquitto:
    # https://hub.docker.com/_/eclipse-mosquitto
    image: eclipse-mosquitto:alpine
    restart: always
    container_name: mosquitto
    ports:
      - 1883:1883
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  # db:
  #     image: mysql:9.6.0
  #     restart: always
  #     environment:
  #       MYSQL_ROOT_PASSWORD: your_root_password
  #       MYSQL_DATABASE: your_database_name
  #       MYSQL_USER: your_username
  #       MYSQL_PASSWORD: your_password
  #     volumes:
  #       - ./mysql_data:/var/lib/mysql
  #     ports:
  #       - "3306:3306"

  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin:fpm-alpine
  #   restart: always
  #   depends_on:
  #     - db
  #   environment:
  #     PMA_HOST: db
  #     MYSQL_ROOT_PASSWORD: your_root_password
  #   ports:
  #     - "8080:80"

  raspap:
    container_name: raspap
    image: ghcr.io/raspap/raspap-docker:latest
    ports:
      - "8081:8081"
    privileged: true
    network_mode: host
    cgroup: host # uncomment when using an ARM device
    environment:
      - RASPAP_SSID=raspap-webgui
      - RASPAP_SSID_PASS=ChangeMe
      - RASPAP_COUNTRY=DE
      - RASPAP_WEBGUI_USER=admin
      - RASPAP_WEBGUI_PASS=secret
      #t - RASPAP_WEBGUI_PORT=8081
    cap_add:
      - SYS_ADMIN
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./raspap-data/firewall-rules.sh:/home/firewall-rules.sh
    restart: unless-stopped
