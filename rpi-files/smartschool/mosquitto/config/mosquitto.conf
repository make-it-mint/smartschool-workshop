# Listen on port 1883 for all network interfaces
listener 1883 0.0.0.0

# Allow connections without a username/password
# Change to 'false' once you've set up a password file
allow_anonymous true

# Persistence settings: This saves your message database to disk
# so subscriptions and retained messages survive a restart
persistence true
persistence_location /mosquitto/data/

# Logging: stdout sends logs to 'docker logs'
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information